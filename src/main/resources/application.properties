# Athena Terminology Server Configuration

# Database Configuration
# Database Configuration
# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/terminologia}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:senha-segura}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.schemas=terminology
spring.flyway.baseline-on-migrate=true

# Package Loading Configuration
# Separador: ","
# Formato: path/to/file.tgz ou packageId:version
# Exemplos:
# athena.packages=/data/packages/hl7.fhir.r4.core-4.0.1.tgz,br.go.ses.reds-go:1.0.0
athena.packages.auto-load=true
athena.packages=br.go.ses.reds-go:1.0.0,br.go.ses.core:1.1.0,br.go.ses.seguranca:0.1.2,br.go.ses.medicamentos:1.0.0,br.go.ses.exame:1.0.0,hl7.terminology.r4:6.5.0,hl7.fhir.uv.extensions.r4:5.2.0,hl7.fhir.uv.tools.r4:0.7.1

# Server Configuration
server.port=8085
spring.application.name=athena

# Logging
logging.level.br.gov.go.saude.athena=INFO
logging.level.org.hibernate.SQL=INFO
