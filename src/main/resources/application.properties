# Athena Terminology Server Configuration

# Database Configuration
# Database Configuration
# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://terminologia-database-rcsfsg:5432/terminologia}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:senha-segura}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.schemas=terminology
spring.flyway.baseline-on-migrate=true

# Package Loading Configuration
# Formato: path/to/file.tgz ou packageId:version
# Exemplos:
# athena.packages=/data/packages/hl7.fhir.r4.core-4.0.1.tgz
athena.packages=hl7.fhir.r4.core:4.0.1,hl7.fhir.uv.extensions:5.2.0,br.go.ses.reds-go:1.0.0
athena.packages.auto-load=true

# Server Configuration
server.port=8085
spring.application.name=athena

# Logging
logging.level.br.gov.go.saude.athena=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
