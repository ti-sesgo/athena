server:
  port: 8085
  # Lê cabeçalhos 'X-Forwarded-*' (como IP original e protocolo) enviados por um proxy/load balancer.
  # QUANDO NÃO USAR: Nunca use se o app estiver exposto DIRETAMENTE à internet sem um proxy confiável na frente.
  # Clientes maliciosos podem forjar esses cabeçalhos (ex: fingindo um IP interno) e burlar seguranças.
  forward-headers-strategy: framework

spring:
  application:
    name: athena

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/terminologia}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:senha-segura}
    driver-class-name: org.postgresql.Driver

  web:
    resources:
      add-mappings: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        show_sql: false

    cache:
      cache-names: concepts
      caffeine:
        spec: maximumSize=1000,expireAfterAccess=2h

  flyway:
    enabled: true
    schemas: terminology
    baseline-on-migrate: true

athena:
  landing-page:
    enabled: true
  packages:
    auto-load: true
    # URL do Registry (opcional, default: https://packages.fhir.org)
    registry-url: https://packages.fhir.org
    # Descrever package a ser carregado:
    # Localmente: path do package FHIR local (ex: /Users/danie/packages/my-package.tgz)
    # Remotamente via registry FHIR: {id}:{versão} (ex: hl7.fhir.r4.core:4.0.1)
    items:
      - br.go.ses.reds-go:1.0.0
      - br.go.ses.core:1.1.0
      - br.go.ses.seguranca:0.1.2
      - br.go.ses.medicamentos:1.0.0
      - br.go.ses.exame:1.0.0
      - hl7.terminology.r4:6.5.0
      - hl7.fhir.uv.extensions.r4:5.2.0
      - hl7.fhir.uv.tools.r4:0.7.1
      - hl7.fhir.r4.core:4.0.1

logging:
  level:
    br.gov.go.saude.athena: INFO
    org.hibernate.SQL: INFO

management:
  server:
    port: 9095
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: athena
      instance: ${HOSTNAME:unknown}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always


