# Prometheus config para Docker SD (service discovery automático)
# Montar como: /etc/prometheus/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'athena'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Só faz scrape em containers com label prometheus.scrape=true
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        regex: 'true'
        action: keep
      # Monta o endereço IP:porta a partir das labels do container
      - source_labels: [__meta_docker_network_ip, __meta_docker_container_label_prometheus_port]
        separator: ':'
        target_label: __address__
      # Path das métricas
      - source_labels: [__meta_docker_container_label_prometheus_path]
        target_label: __metrics_path__
      # Nome legível da instância
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: instance
